version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: chatisp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: chatisp_user
      POSTGRES_PASSWORD: DEMBI2006
      POSTGRES_DB: chatisp_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"   # Exposé localement uniquement
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatisp_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chatisp-network

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: chatisp-pgbouncer
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://chatisp_user:DEMBI2006@db:5432/chatisp_db
      - POOL_MODE=transaction
      - MAX_CLIENT_CONN=1000
      - DEFAULT_POOL_SIZE=50
      - RESERVE_POOL_SIZE=10
      - RESERVE_POOL_TIMEOUT=5
    ports:
      - "6432:6432"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - chatisp-network

  app:
    build: .
    container_name: chatisp-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # DATABASE_URL pointe maintenant vers PgBouncer (port 6432)
      - DATABASE_URL=postgresql+asyncpg://chatisp_user:DEMBI2006@pgbouncer:6432/chatisp_db
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL}
      - GEMINI_CACHE_TTL=${GEMINI_CACHE_TTL}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL}
      - CHROMA_PATH=/app/data/vector_store
      - SIMILARITY_THRESHOLD=${SIMILARITY_THRESHOLD}
      - MEMORY_LIMIT=${MEMORY_LIMIT}
      - LOG_LEVEL=${LOG_LEVEL}
      - LOG_FILE=/app/data/logs/app.json
      - DEBUG=${DEBUG}
    volumes:
      - ./data:/app/data
    depends_on:
      pgbouncer:
        condition: service_started
      db:
        condition: service_healthy
    networks:
      - chatisp-network

volumes:
  postgres_data:

networks:
  chatisp-network:
    driver: bridge