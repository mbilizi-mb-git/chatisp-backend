version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: chatisp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: chatisp_user
      POSTGRES_PASSWORD: DEMBI2006  
      POSTGRES_DB: chatisp_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatisp_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chatisp-network

  app:
    build: .
    container_name: chatisp-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://chatisp_user:change_me@db:5432/chatisp_db
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL}
      - GEMINI_CACHE_TTL=${GEMINI_CACHE_TTL}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL}
      - CHROMA_PATH=/app/data/vector_store
      - SIMILARITY_THRESHOLD=${SIMILARITY_THRESHOLD}
      - MEMORY_LIMIT=${MEMORY_LIMIT}
      - LOG_LEVEL=${LOG_LEVEL}
      - LOG_FILE=/app/data/logs/app.json
      - DEBUG=${DEBUG}
      - LOG_LEVEL=${LOG_LEVEL}
      - LOG_FILE=${LOG_FILE}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - POSTGRES_USER=${POSTGRES_USER:-chatisp_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-change_me}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-chatisp_db}
      - APP_NAME=${APP_NAME}
      - CREATOR=${CREATOR}
      - TEMPERATURE=${TEMPERATURE}
      
    volumes:
      - ./data:/app/data   # Persistance de ChromaDB et logs
    depends_on:
      db:
        condition: service_healthy
    networks:
      - chatisp-network

volumes:
  postgres_data:

networks:
  chatisp-network:
    driver: bridge